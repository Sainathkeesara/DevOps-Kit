---
# Ansible Patch Management Playbook
# Purpose: Automate security patching across Linux servers
# Requirements: Ansible 2.9+, SSH access to target hosts
# Safety: Respects DRY_RUN variable for all destructive operations

- name: Linux Patch Management
  hosts: "{{ limit_hosts | default('all') }}"
  become: yes
  gather_facts: yes
  vars:
    dry_run: "{{ dry_run | default(true) | bool }}"
    patch_bundle: "{{ patch_bundle | default('critical') }}"
    update_cache_valid_time: 3600
    security_mail_recipients: []

  tasks:
    - name: Gather facts for reporting
      ansible.builtin.setup:
      tags: always

    - name: Update apt cache (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: "{{ update_cache_valid_time }}"
      when: ansible_os_family == "Debian"
      tags: [packages, facts]

    - name: Check available security updates (Debian)
      ansible.builtin.shell: |
        apt-get -s upgrade | grep -i security | wc -l
      register: security_update_count
      changed_when: false
      when: ansible_os_family == "Debian"
      tags: [packages, facts]

    - name: Check pending reboots (Linux)
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file
      tags: [reboot-check, facts]

    - name: Check reboot needed via needs-restarting
      ansible.builtin.shell: |
        needs-restarting -r 2>/dev/null || echo "no"
      register: reboot_needed_rhel
      changed_when: false
      failed_when: false
      when: ansible_os_family == "RedHat"
      tags: [reboot-check, facts]

    - name: Display reboot requirement status
      ansible.builtin.debug:
        msg: "Reboot required: {{ reboot_required_file.stat.exists }}"
      when: ansible_os_family == "Debian"
      tags: [reboot-check]

    - name: Apply critical security updates (Debian)
      ansible.builtin.apt:
        upgrade: safe
        autoremove: yes
        purge: no
      when: 
        - ansible_os_family == "Debian"
        - patch_bundle in ['critical', 'security', 'all']
      tags: [packages]
      register: apt_update_result

    - name: Apply critical security updates (RedHat)
      ansible.builtin.yum:
        security: yes
        update_only: yes
      when: 
        - ansible_os_family == "RedHat"
        - patch_bundle in ['critical', 'security', 'all']
      tags: [packages]
      register: yum_update_result

    - name: Apply all updates (when bundle is all)
      ansible.builtin.apt:
        upgrade: full
        autoremove: yes
      when: 
        - ansible_os_family == "Debian"
        - patch_bundle == 'all'
      tags: [packages]

    - name: Apply all updates (RedHat - when bundle is all)
      ansible.builtin.yum:
        state: latest
      when: 
        - ansible_os_family == "RedHat"
        - patch_bundle == 'all'
      tags: [packages]

    - name: Clean apt cache (Debian)
      ansible.builtin.shell: |
        apt-get clean
      when: 
        - ansible_os_family == "Debian"
        - dry_run | bool == false
      tags: [packages]

    - name: Verify applied packages
      ansible.builtin.shell: |
        dpkg --list | grep -i security | wc -l
      register: installed_security_packages
      changed_when: false
      tags: [verify]

    - name: Display patch status
      ansible.builtin.debug:
        msg: |
          OS: {{ ansible_os_family }}
          Security packages: {{ installed_security_packages.stdout }}
          Updates applied: {{ apt_update_result.changed | default(false) or yum_update_result.changed | default(false) }}
      tags: [verify]

    - name: Check for kernel updates
      ansible.builtin.shell: |
        rpm -qa | grep -E '^kernel-[0-9]' | tail -n 1
      register: current_kernel
      changed_when: false
      when: ansible_os_family == "RedHat"
      tags: [verify]

    - name: Check running kernel version
      ansible.builtin.shell: |
        uname -r
      register: running_kernel
      changed_when: false
      tags: [verify]

    - name: Determine if kernel reboot needed
      ansible.builtin.debug:
        msg: |
          Kernel update available: 
          Current running: {{ running_kernel.stdout }}
          Latest installed: {{ current_kernel.stdout | default(running_kernel.stdout) }}
      when: 
        - ansible_os_family == "RedHat"
        - current_kernel.stdout is defined
      tags: [verify]

    - name: Reboot if required (Debian)
      ansible.builtin.reboot:
        reboot_timeout: 600
      when: 
        - ansible_os_family == "Debian"
        - reboot_required_file.stat.exists
        - dry_run | bool == false
      tags: [reboot]

    - name: Reboot if required (RHEL)
      ansible.builtin.reboot:
        reboot_timeout: 600
      when: 
        - ansible_os_family == "RedHat"
        - "'yes' in reboot_needed_rhel.stdout"
        - dry_run | bool == false
      tags: [reboot]

    - name: Post-reboot verification
      ansible.builtin.wait_for_connection:
        timeout: 60
      when: ansible_reboot_pending | default(false)
      tags: [reboot]

    - name: Verify services after reboot
      ansible.builtin.service_facts:
      tags: [verify]

    - name: Report failed services
      ansible.builtin.debug:
        msg: "Failed services detected"
      when: 
        - ansible_facts.services | length > 0
        - ansible_facts.services | selectattr('state', 'neq', 'running') | length > 0
      tags: [verify]
