# Logstash Centralized Logging Pipeline
# Purpose: Accept logs from syslog-ng and Beats, enrich with GeoIP, index into Elasticsearch
# Requirements: Logstash 8.x, Elasticsearch 8.x
# Input ports: 5140 (syslog-ng JSON), 5044 (Beats)
# Tested on: Logstash 8.15, Elasticsearch 8.15

input {
  tcp {
    port => 5140
    codec => json_lines
    type => "syslog-ng"
    tags => ["syslog", "centralized"]
  }

  beats {
    port => 5044
    type => "beats"
    tags => ["beats", "centralized"]
  }
}

filter {
  if "syslog" in [tags] {
    # Parse syslog timestamp
    date {
      match => ["@timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSSSSZ", "yyyy-MM-dd'T'HH:mm:ssZ"]
      target => "@timestamp"
      tag_on_failure => ["_dateparsefailure"]
    }

    # Normalize severity levels
    if [severity] {
      mutate {
        lowercase => [ "severity" ]
        add_field => { "log_source" => "syslog-ng" }
      }
    }

    # Enrich SSH authentication events with GeoIP
    if [program] == "sshd" and [message] =~ "(?i)accepted|failed|invalid" {
      grok {
        match => {
          "message" => [
            "Accepted %{WORD:auth_method} for %{USER:ssh_user} from %{IP:source_ip} port %{INT:source_port} ssh2",
            "Failed password for %{USER:ssh_user} from %{IP:source_ip} port %{INT:source_port}",
            "Invalid user %{USER:ssh_user} from %{IP:source_ip} port %{INT:source_port}"
          ]
        }
        tag_on_failure => ["_grok_auth_failure"]
      }

      if [source_ip] {
        geoip {
          source => "source_ip"
          target => "geoip"
          fields => ["country_name", "city_name", "region_name", "latitude", "longitude"]
        }
      }

      mutate {
        add_field => {
          "event_category" => "authentication"
          "event_outcome" => "%{auth_method}"
        }
      }
    }

    # Enrich sudo events
    if [program] == "sudo" {
      grok {
        match => {
          "message" => "%{USER:sudo_user} : %{DATA:sudo_command} ; TTY=%{DATA:sudo_tty} ; PWD=%{DATA:sudo_pwd} ; USER=%{DATA:sudo_target_user} ; COMMAND=%{GREEDYDATA:sudo_cmd}"
        }
        tag_on_failure => ["_grok_sudo_failure"]
      }
      mutate {
        add_field => { "event_category" => "privilege_escalation" }
      }
    }

    # Enrich cron events
    if [program] == "CRON" or [program] == "cron" {
      mutate {
        add_field => { "event_category" => "scheduled_task" }
      }
    }

    # Add pipeline metadata
    mutate {
      add_field => {
        "pipeline_version" => "1.0"
        "processed_by" => "centralized-logging-pipeline"
      }
    }

    # Remove empty fields
    prune {
      whitelist_names => [
        "^@timestamp$", "^hostname$", "^program$", "^severity$", "^facility$",
        "^message$", "^source_ip$", "^geoip$", "^auth_method$", "^ssh_user$",
        "^event_category$", "^event_outcome$", "^sudo_user$", "^sudo_cmd$",
        "^log_source$", "^pipeline_version$", "^type$", "^tags$"
      ]
    }
  }
}

output {
  if "syslog" in [tags] {
    elasticsearch {
      hosts => ["http://localhost:9200"]
      index => "centralized-logs-%{+YYYY.MM.dd}"
      template_name => "centralized-logs"
      manage_template => false
      retry_on_conflict => 3
    }
  }

  if "beats" in [tags] {
    elasticsearch {
      hosts => ["http://localhost:9200"]
      index => "beats-logs-%{+YYYY.MM.dd}"
      retry_on_conflict => 3
    }
  }
}
