@version: 4.5
@include "scl.conf"

################################################################################
# syslog-ng Centralized Logging Configuration
# Purpose: Collect logs from local and remote sources, write JSON to disk,
#          forward to Logstash for enrichment and indexing
# Requirements: syslog-ng 4.x+, syslog-ng-mod-json
# Tested on: Ubuntu 22.04 (syslog-ng 4.5), RHEL 9 (syslog-ng 4.4)
################################################################################

options {
    chain-hostnames(no);
    create-dirs(yes);
    dir-group("adm");
    dir-perm(0750);
    group("adm");
    keep-hostname(yes);
    log-fifo-size(10000);
    perm(0640);
    time-reopen(10);
    use-dns(no);
    use-fqdn(no);
    stats(freq(0));
};

# --- Local sources ---
source s_local {
    system();
    internal();
};

# --- Remote syslog sources ---
source s_remote_tcp {
    tcp(
        ip("0.0.0.0")
        port(514)
        max-connections(200)
        log-iw-size(10000)
    );
};

source s_remote_udp {
    udp(
        ip("0.0.0.0")
        port(514)
    );
};

# --- Filters ---
filter f_auth    { facility(auth, authpriv); };
filter f_kernel  { facility(kern); };
filter f_cron    { facility(cron); };
filter f_mail    { facility(mail); };
filter f_err     { level(err..emerg); };
filter f_warn    { level(warn..emerg); };
filter f_notice  { level(notice..emerg); };

# --- Rewrite rules ---
rewrite r_enrich {
    set("${HOST}", value(".meta.hostname"));
    set("${ISODATE}", value(".meta.received_at"));
    set("${PROGRAM}", value(".meta.program"));
    set("${FACILITY}", value(".meta.facility"));
    set("${LEVEL}", value(".meta.severity"));
};

# --- JSON destination (all logs to disk) ---
destination d_json_all {
    file(
        "/var/log/centralized/all.json"
        template("$(format-json --scope dot-nv-pairs \
            --pair @timestamp='${ISODATE}' \
            --pair hostname='${HOST}' \
            --pair program='${PROGRAM}' \
            --pair severity='${LEVEL}' \
            --pair facility='${FACILITY}' \
            --pair pid='${PID}' \
            --pair message='${MESSAGE}' \
            --key .meta.*)\n")
        create-dirs(yes)
    );
};

# --- Auth logs (separate file) ---
destination d_auth_file {
    file(
        "/var/log/centralized/auth.log"
        template("${ISODATE} ${HOST} ${PROGRAM}: ${MESSAGE}\n")
    );
};

# --- Kernel logs (separate file) ---
destination d_kernel_file {
    file(
        "/var/log/centralized/kern.log"
        template("${ISODATE} ${HOST} kernel: ${MESSAGE}\n")
    );
};

# --- Error logs (separate file for alerting) ---
destination d_errors_file {
    file(
        "/var/log/centralized/errors.log"
        template("$(format-json --scope dot-nv-pairs \
            --pair @timestamp='${ISODATE}' \
            --pair hostname='${HOST}' \
            --pair program='${PROGRAM}' \
            --pair severity='${LEVEL}' \
            --pair message='${MESSAGE}')\n")
    );
};

# --- Logstash forwarder (TCP, JSON) ---
destination d_logstash {
    tcp(
        "logging-server"
        port(5140)
        log-fifo-size(10000)
        flags(no-multi-line)
        disk-buffer(
            mem-buf-size(2097152)
            disk-buf-size(536870912)
            reliable(yes)
        )
    );
};

# --- Log routing ---
log { source(s_local);      rewrite(r_enrich); destination(d_json_all); };
log { source(s_remote_tcp);  rewrite(r_enrich); destination(d_json_all); };
log { source(s_remote_udp);  rewrite(r_enrich); destination(d_json_all); };

log { source(s_local);      filter(f_auth);   destination(d_auth_file); };
log { source(s_remote_tcp);  filter(f_auth);   destination(d_auth_file); };
log { source(s_local);      filter(f_kernel); destination(d_kernel_file); };
log { source(s_remote_tcp);  filter(f_kernel); destination(d_kernel_file); };
log { source(s_local);      filter(f_err);    destination(d_errors_file); };
log { source(s_remote_tcp);  filter(f_err);    destination(d_errors_file); };

log { source(s_local);      destination(d_logstash); };
log { source(s_remote_tcp);  destination(d_logstash); };
log { source(s_remote_udp);  destination(d_logstash); };
