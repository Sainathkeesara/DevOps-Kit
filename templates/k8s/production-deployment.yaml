---
# Kubernetes Production Deployment Template
# Includes: Deployment + HorizontalPodAutoscaler + PodDisruptionBudget
#
# USAGE:
#   1. Copy this file and customize the values (APP_NAME, IMAGE, REPLICAS, etc.)
#   2. Apply with: kubectl apply -f production-deployment.yaml
#   3. Or use the helper script: ./deploy-prod-app.sh <app-name> <image> [namespace]
#
# CUSTOMIZE THESE VALUES BEFORE APPLYING:
#   - APP_NAME:        Your application name (e.g., api-service)
#   - APP_VERSION:     Image tag (e.g., v1.2.3)
#   - NAMESPACE:       Target namespace (default: default)
#   - REPLICAS:        Initial replica count (default: 3)
#   - MIN_REPLICAS:    HPA minimum replicas (default: 2)
#   - MAX_REPLICAS:    HPA maximum replicas (default: 10)
#   - CPU_REQUEST:     CPU request (e.g., 100m, 500m)
#   - CPU_LIMIT:       CPU limit (e.g., 500m, 2000m)
#   - MEMORY_REQUEST:  Memory request (e.g., 128Mi, 256Mi)
#   - MEMORY_LIMIT:    Memory limit (e.g., 256Mi, 512Mi)
#   - MAX_UNAVAILABLE: Max pods that can be unavailable during rollout (default: 1)
#   - MIN_AVAILABLE:   Min pods that must remain available (for PDB, default: 1)

---
apiVersion: v1
kind: Namespace
metadata:
  name: APP_NAMESPACE_PLACEHOLDER
  labels:
    name: APP_NAMESPACE_PLACEHOLDER
    environment: production
---
apiVersion: v1
kind: Service
metadata:
  name: APP_NAME_PLACEHOLDER
  namespace: APP_NAMESPACE_PLACEHOLDER
  labels:
    app: APP_NAME_PLACEHOLDER
    version: APP_VERSION_PLACEHOLDER
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: APP_NAME_PLACEHOLDER
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: APP_NAME_PLACEHOLDER
  namespace: APP_NAMESPACE_PLACEHOLDER
  labels:
    app: APP_NAME_PLACEHOLDER
    version: APP_VERSION_PLACEHOLDER
spec:
  replicas: REPLICAS_PLACEHOLDER
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: MAX_UNAVAILABLE_PLACEHOLDER
      maxSurge: 1
  selector:
    matchLabels:
      app: APP_NAME_PLACEHOLDER
  template:
    metadata:
      labels:
        app: APP_NAME_PLACEHOLDER
        version: APP_VERSION_PLACEHOLDER
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: APP_NAME_PLACEHOLDER
                topologyKey: kubernetes.io/hostname
      containers:
        - name: APP_NAME_PLACEHOLDER
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: CPU_REQUEST_PLACEHOLDER
              memory: MEMORY_REQUEST_PLACEHOLDER
            limits:
              cpu: CPU_LIMIT_PLACEHOLDER
              memory: MEMORY_LIMIT_PLACEHOLDER
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
      terminationGracePeriodSeconds: 30
      serviceAccountName: APP_NAME_PLACEHOLDER
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: APP_NAME_PLACEHOLDER
  namespace: APP_NAMESPACE_PLACEHOLDER
  labels:
    app: APP_NAME_PLACEHOLDER
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: APP_NAME_PLACEHOLDER
  namespace: APP_NAMESPACE_PLACEHOLDER
  labels:
    app: APP_NAME_PLACEHOLDER
spec:
  minAvailable: MIN_AVAILABLE_PLACEHOLDER
  selector:
    matchLabels:
      app: APP_NAME_PLACEHOLDER
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: APP_NAME_PLACEHOLDER
  namespace: APP_NAMESPACE_PLACEHOLDER
  labels:
    app: APP_NAME_PLACEHOLDER
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: APP_NAME_PLACEHOLDER
  minReplicas: MIN_REPLICAS_PLACEHOLDER
  maxReplicas: MAX_REPLICAS_PLACEHOLDER
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
